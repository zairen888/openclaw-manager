<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Manager 🦞</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ccircle cx='256' cy='256' r='248' fill='%231a1a2e' stroke='%2334c759' stroke-width='6'/%3E%3Cellipse cx='256' cy='280' rx='60' ry='90' fill='%23e63946'/%3E%3Cpath d='M216 350 Q200 400 220 430 Q240 460 256 470 Q272 460 292 430 Q312 400 296 350' fill='%23780000'/%3E%3Cellipse cx='256' cy='190' rx='50' ry='45' fill='%23e63946'/%3E%3Ccircle cx='238' cy='178' r='10' fill='%23fff'/%3E%3Ccircle cx='274' cy='178' r='10' fill='%23fff'/%3E%3Ccircle cx='240' cy='176' r='5' fill='%231a1a2e'/%3E%3Ccircle cx='276' cy='176' r='5' fill='%231a1a2e'/%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="toast" id="toast"></div>

<!-- Login Screen -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="lobster">🦞</div>
    <h2>OpenClaw Manager</h2>
    <p>请输入凭证以访问管理面板</p>
    <input class="login-input" type="text" id="loginUser" placeholder="用户名" value="admin">
    <input class="login-input" type="password" id="loginPass" placeholder="密码" value="admin123">
    <button class="login-btn" onclick="handleLogin()">登 录</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">默认账号 admin / admin123</div>
  </div>
</div>

<!-- Main App -->
<div class="app" id="appWindow" style="display:none">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand"><div class="logo">🦞</div><div class="name">OpenClaw</div><div class="ver">v1.5.0</div></div>
    <div class="nav-section">
      <div class="nav-section-label">概览</div>
      <div class="nav-item active" data-page="dashboard">📊 仪表盘</div>
      <div class="nav-item" data-page="usage">📈 用量统计</div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">管理</div>
      <div class="nav-item" data-page="services">⚙️ 服务管理</div>
      <div class="nav-item" data-page="models">🧠 模型配置</div>
      <div class="nav-item" data-page="skills">🧩 技能管理 <span class="badge">7</span></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">系统</div>
      <div class="nav-item" data-page="accounts">👥 账号与权限</div>
      <div class="nav-item" data-page="env">🔍 环境检查</div>
      <div class="nav-item" data-page="settings">⚡ 设置</div>
      <div class="nav-item" data-page="logs">📋 日志导出</div>
      <div class="nav-item" data-page="update">🔄 检查更新</div>
    </div>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar" id="userAvatar">A</div>
        <div><div class="uname" id="userName">admin</div><div class="urole" id="userRole">管理员</div></div>
        <div class="logout" onclick="handleLogout()" title="退出登录">⏻</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <div class="breadcrumb">OpenClaw / <span class="current" id="breadcrumbCurrent">仪表盘</span></div>
      <div class="actions">
        <button class="btn-icon" onclick="showToast('已刷新数据','info')" title="刷新">⟳</button>
        <button class="btn-icon" id="minBtn" title="最小化">—</button>
      </div>
    </div>
    <div class="content" id="pageContent"></div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
